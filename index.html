<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HEYY....</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: #050510;
        }
        
        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        /* ========== COSMIC RADIAL BURST BACKGROUND ========== 
           Like a milky galaxy with a central light source spreading rays */
        .cosmic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, 
                rgba(255, 220, 180, 0.15) 0%,
                rgba(255, 180, 130, 0.08) 15%,
                rgba(150, 100, 200, 0.05) 35%,
                rgba(40, 20, 70, 0.4) 60%,
                #0a0a2a 100%);
            z-index: 0;
        }
        
        /* Light rays spreading from center point */
        .light-ray {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200%;
            height: 4px;
            background: linear-gradient(90deg, 
                rgba(255, 200, 150, 0) 0%,
                rgba(255, 180, 120, 0.6) 30%,
                rgba(255, 140, 100, 0.3) 60%,
                rgba(255, 200, 150, 0) 100%);
            transform-origin: 0% 50%;
            pointer-events: none;
            animation: rayRotate 18s linear infinite;
            opacity: 0.4;
            filter: blur(2px);
        }
        
        @keyframes rayRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        /* Secondary slower rays */
        .light-ray-slow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 180%;
            height: 6px;
            background: linear-gradient(90deg, 
                rgba(200, 150, 255, 0) 0%,
                rgba(180, 120, 255, 0.4) 25%,
                rgba(200, 100, 200, 0.2) 50%,
                rgba(180, 120, 255, 0) 100%);
            transform-origin: 0% 50%;
            pointer-events: none;
            animation: rayRotateSlow 20s linear infinite reverse;
            opacity: 0.3;
            filter: blur(3px);
        }
        
        @keyframes rayRotateSlow {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(-360deg); }
        }
        
        /* Glowing dust particles floating outward from center */
        .cosmic-dust {
            position: absolute;
            background: radial-gradient(circle, rgba(255, 200, 150, 0.8) 0%, rgba(255, 120, 80, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: dustDrift 15s ease-out forwards;
            filter: blur(1px);
        }
        
        @keyframes dustDrift {
            0% {
                transform: translate(0, 0) scale(0.2);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            100% {
                transform: translate(var(--dx, 200px), var(--dy, -150px)) scale(1.5);
                opacity: 0;
            }
        }
        
        /* Central glowing orb (like a sun) */
        .central-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, 
                rgba(255, 200, 150, 0.25) 0%,
                rgba(255, 160, 100, 0.12) 30%,
                rgba(200, 100, 150, 0.05) 60%,
                transparent 100%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(30px);
            animation: pulseGlow 3s ease-in-out infinite alternate;
        }
        
        @keyframes pulseGlow {
            0% { opacity: 0.5; transform: translate(-50%, -50%) scale(0.9); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }
        
        /* Stars twinkling in background */
        .star-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 2s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }
        
        /* Glassmorphism card with radial glow effect - CENTERED & MOVING */
        .glass-card {
            background: rgba(20, 15, 45, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 3rem;
            border: 1px solid rgba(255, 200, 150, 0.35);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(255, 160, 100, 0.25);
            transition: transform 0.15s ease-out;
            will-change: transform;
            /* ensure card stays centered in flex */
            margin: 0 auto;
        }
        
        /* Main container - ensures perfect centering */
        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
            position: relative;
            z-index: 20;
        }
        
        /* TITLE BOUNCE & FLOAT with cosmic glow */
        .moving-title {
            display: inline-block;
            animation: gentleFloat 3.6s ease-in-out infinite;
            transform-origin: center;
            will-change: transform;
        }
        
        @keyframes gentleFloat {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-16px) scale(1.02); }
            100% { transform: translateY(0px) scale(1); }
        }
        
        /* Glowing SORRY text - cosmic radial influence */
        .cosmic-sorry {
            background: linear-gradient(135deg, #ffcc88, #ffaa66, #dd88ff, #aa66ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(255, 180, 100, 0.5), 0 0 60px rgba(200, 100, 200, 0.3);
            letter-spacing: -0.02em;
            animation: gradientShift 5s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Forgive Button - cosmic gradient */
        .forgive-btn {
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            background: linear-gradient(115deg, #ff9966, #ff66cc, #aa66ff);
            background-size: 200% auto;
            border: none;
            box-shadow: 0 12px 28px -8px rgba(255, 100, 100, 0.4);
        }
        
        .forgive-btn:hover {
            transform: scale(1.06) translateY(-3px);
            box-shadow: 0 22px 40px -12px #ff8866;
            filter: brightness(1.05);
        }
        
        /* Ripple effect - cosmic wave */
        .cosmic-ripple {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 200, 150, 0.6) 0%, rgba(200, 100, 200, 0.2) 100%);
            pointer-events: none;
            transform: scale(0);
            animation: rippleExpand 0.9s ease-out forwards;
            z-index: 200;
        }
        
        @keyframes rippleExpand {
            to { transform: scale(20); opacity: 0; }
        }
        
        /* Spark burst - like light particles from center */
        .light-spark {
            position: absolute;
            pointer-events: none;
            background: radial-gradient(circle, #ffcc88, #ff8866);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: sparkFly 1s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
            z-index: 150;
            box-shadow: 0 0 12px #ffaa66;
        }
        
        @keyframes sparkFly {
            0% {
                transform: translate(0, 0) scale(0.2);
                opacity: 1;
            }
            30% { opacity: 0.9; transform: scale(1.3); }
            100% {
                transform: translate(var(--dx, 100px), var(--dy, -120px)) scale(0.3);
                opacity: 0;
            }
        }
        
        /* Cosmic confetti - tiny stars */
        .cosmic-confetti {
            position: absolute;
            pointer-events: none;
            animation: confettiFall 2.5s ease-out forwards;
            font-size: 14px;
            z-index: 130;
            filter: drop-shadow(0 0 4px #ffaa66);
        }
        
        @keyframes confettiFall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        /* Typing cursor */
        .typing-cursor::after {
            content: '|';
            animation: blinkSoft 1s step-end infinite;
            color: #ffaa66;
            font-weight: 300;
        }
        
        @keyframes blinkSoft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        /* Thank you card - cosmic themed */
        .thank-you-card {
            transform: scale(0.9) translateY(20px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
            background: rgba(30, 20, 55, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 200, 150, 0.4);
            border-radius: 1.5rem;
        }
        
        .thank-you-card.show {
            transform: scale(1) translateY(0);
            opacity: 1;
        }
        
        /* Text colors */
        .message-text {
            color: rgba(255, 240, 220, 0.95);
        }
        
        .sub-text {
            color: rgba(255, 200, 170, 0.7);
        }
        
        /* Card movement container - slight independent floating */
        .card-move {
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
    </style>
</head>
<body>

    <!-- COSMIC BACKGROUND WITH RADIAL LIGHT BURST -->
    <div class="cosmic-bg"></div>
    
    <!-- Central glowing orb -->
    <div class="central-glow"></div>
    
    <!-- Rotating light rays spreading from center -->
    <div class="light-ray"></div>
    <div class="light-ray-slow"></div>
    <div class="light-ray" style="animation-duration: 19s; opacity: 0.25; width: 250%;"></div>
    <div class="light-ray-slow" style="animation-duration: 42s; opacity: 0.2; width: 220%;"></div>
    
    <!-- Starfield -->
    <div id="starfield" class="star-bg"></div>
    
    <!-- Dynamic dust particles container -->
    <div id="cosmicDustContainer" class="fixed inset-0 pointer-events-none z-5"></div>
    
    <!-- Spark container for click effects -->
    <div id="sparkContainer" class="fixed inset-0 pointer-events-none z-100"></div>

    <!-- CENTERED CARD CONTAINER with flex centering -->
    <div class="flex-center">
        <div id="movingCard" class="glass-card rounded-3xl p-8 md:p-12 max-w-2xl w-full text-center card-move">
            
            <!-- Decorative cosmic icon -->
            <div class="mb-6 flex justify-center">
                <div class="p-4 rounded-full bg-white/10 border border-orange-300/30 text-amber-300 shadow-lg">
                    <i data-lucide="sparkles" class="w-8 h-8"></i>
                </div>
            </div>

            <!-- MOVING SORRY TITLE with cosmic gradient glow -->
            <div class="moving-title mb-8">
                <h1 class="text-6xl md:text-8xl font-extrabold cosmic-sorry tracking-tighter">
                    SORRYY...
                </h1>
            </div>

            <!-- Typing message -->
            <div class="mb-6">
                <p id="dynamicMessage" class="font-serif text-xl md:text-2xl message-text italic typing-cursor leading-relaxed"></p>
            </div>

            <!-- Additional remorse text -->
            <p class="sub-text text-sm md:text-base mb-10 font-light max-w-md mx-auto">
                Please forgive me.
            </p>

            <!-- Forgive Button Container -->
            <div id="buttonArea" class="flex justify-center">
                <button id="forgiveBtn" onclick="handleForgive()" class="forgive-btn px-12 py-4 rounded-full text-white font-semibold text-xl shadow-2xl flex items-center justify-center gap-3 transition-all">
                    <span>Forgive Me</span>
                    <i data-lucide="sparkle" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- Thank You Message -->
            <div id="thankYouBlock" class="thank-you-card mt-8 hidden p-6">
                <p class="text-3xl font-serif text-orange-200 mb-2">🌌 Thank You 🌌</p>
                <p class="text-gray-200 text-base">Thank you so much</p>
                <div class="flex justify-center gap-3 mt-4 text-2xl">
                    <span>✨</span><span>🌟</span><span>⭐</span>
                </div>
            </div>

            <!-- decorative footer -->
            <div class="mt-8 flex justify-center gap-3 opacity-50">
                <i data-lucide="sparkle" class="w-4 h-4 text-orange-300"></i>
                <i data-lucide="star" class="w-4 h-4 text-amber-300"></i>
                <i data-lucide="sparkles" class="w-4 h-4 text-orange-300"></i>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // ========== TYPING ANIMATION ==========
        const apologyMsg = "I never meant to hurt you. Please forgive me.";
        const msgElement = document.getElementById('dynamicMessage');
        let msgIndex = 0;
        
        function typeApology() {
            if (msgIndex < apologyMsg.length) {
                msgElement.textContent += apologyMsg.charAt(msgIndex);
                msgIndex++;
                setTimeout(typeApology, 45 + Math.random() * 40);
            } else {
                setTimeout(() => {
                    msgElement.classList.remove('typing-cursor');
                }, 800);
            }
        }
        setTimeout(typeApology, 400);
        
        // ========== CREATE STARFIELD BACKGROUND ==========
        function createStarfield() {
            const starContainer = document.getElementById('starfield');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.animationDelay = `${Math.random() * 5}s`;
                star.style.animationDuration = `${Math.random() * 3 + 2}s`;
                starContainer.appendChild(star);
            }
        }
        createStarfield();
        
        // ========== COSMIC DUST PARTICLES (spreading outward from center) ==========
        function createCosmicDust() {
            const container = document.getElementById('cosmicDustContainer');
            const dust = document.createElement('div');
            dust.className = 'cosmic-dust';
            
            const size = Math.random() * 8 + 3;
            dust.style.width = `${size}px`;
            dust.style.height = `${size}px`;
            
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * 300 + 100;
            const dx = Math.cos(angle) * distance;
            const dy = Math.sin(angle) * distance - 50;
            
            dust.style.left = `${centerX}px`;
            dust.style.top = `${centerY}px`;
            dust.style.setProperty('--dx', `${dx}px`);
            dust.style.setProperty('--dy', `${dy}px`);
            dust.style.animationDuration = `${Math.random() * 4 + 3}s`;
            
            container.appendChild(dust);
            setTimeout(() => dust.remove(), 6000);
        }
        
        setInterval(createCosmicDust, 400);
        for (let i = 0; i < 50; i++) setTimeout(createCosmicDust, i * 150);
        
        // ========== COSMIC RIPPLE EFFECT ==========
        function createCosmicRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.className = 'cosmic-ripple';
            ripple.style.left = `${x - 50}px`;
            ripple.style.top = `${y - 50}px`;
            ripple.style.width = '100px';
            ripple.style.height = '100px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 10);
        }
        
        // ========== LIGHT SPARK BURST ==========
        function createLightSparkBurst(element) {
            const rect = element.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const burstCount = 85;
            
            for (let i = 0; i < burstCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 180 + 60;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance - 50;
                const spark = document.createElement('div');
                spark.className = 'light-spark';
                spark.style.left = `${centerX - 4}px`;
                spark.style.top = `${centerY - 4}px`;
                spark.style.setProperty('--dx', `${dx}px`);
                spark.style.setProperty('--dy', `${dy}px`);
                spark.style.animationDuration = `${Math.random() * 0.6 + 0.7}s`;
                document.body.appendChild(spark);
                setTimeout(() => spark.remove(), 1000);
            }
        }
        
        // ========== COSMIC CONFETTI ==========
        function createCosmicConfetti() {
            const symbols = ['✨', '⭐', '🌟', '💫', '✧', '✦', '⚡', '🌠'];
            for (let i = 0; i < 120; i++) {
                const conf = document.createElement('div');
                conf.className = 'cosmic-confetti';
                conf.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '-20px';
                conf.style.fontSize = `${Math.random() * 18 + 12}px`;
                conf.style.animationDelay = Math.random() * 0.6 + 's';
                conf.style.animationDuration = `${Math.random() * 1.5 + 1.8}s`;
                conf.style.opacity = Math.random() * 0.8 + 0.4;
                conf.style.color = `hsl(${Math.random() * 40 + 20}, 100%, 65%)`;
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 4000);
            }
        }
        
        // ========== MASSIVE RADIAL BURST ==========
        function createMassiveRadialBurst(x, y) {
            for (let i = 0; i < 35; i++) {
                const dust = document.createElement('div');
                dust.className = 'cosmic-dust';
                const size = Math.random() * 12 + 3;
                dust.style.width = `${size}px`;
                dust.style.height = `${size}px`;
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 250 + 80;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance;
                dust.style.left = `${x}px`;
                dust.style.top = `${y}px`;
                dust.style.setProperty('--dx', `${dx}px`);
                dust.style.setProperty('--dy', `${dy}px`);
                dust.style.animationDuration = `${Math.random() * 1.2 + 0.8}s`;
                document.body.appendChild(dust);
                setTimeout(() => dust.remove(), 1500);
            }
        }
        
       
        
        // ========== HANDLE FORGIVE CLICK ==========
        function handleForgive() {
            const btn = document.getElementById('forgiveBtn');
            if (!btn || btn.disabled) return;
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-pulse flex items-center gap-2"><i data-lucide="sparkles" class="w-5 h-5 animate-spin"></i> Healing...</span>';
            lucide.createIcons();
            
            document.addEventListener('click', function onClickRipple(e) {
                createCosmicRipple(e.clientX, e.clientY);
                createMassiveRadialBurst(e.clientX, e.clientY);
                document.removeEventListener('click', onClickRipple);
            }, { once: true });
            
            createLightSparkBurst(btn);
            createCosmicConfetti();
            for (let i = 0; i < 50; i++) {
                setTimeout(() => createCosmicDust(), i * 50);
            }
            playForgivenessTone();
            
            const flashDiv = document.createElement('div');
            flashDiv.style.position = 'fixed';
            flashDiv.style.top = 0;
            flashDiv.style.left = 0;
            flashDiv.style.width = '100%';
            flashDiv.style.height = '100%';
            flashDiv.style.backgroundColor = 'rgba(255, 200, 150, 0.4)';
            flashDiv.style.pointerEvents = 'none';
            flashDiv.style.zIndex = 999;
            flashDiv.style.animation = 'fadeOutFlash 0.6s forwards';
            const styleSheet = document.createElement('style');
            styleSheet.textContent = `@keyframes fadeOutFlash { 0% { opacity: 0.8; } 100% { opacity: 0; visibility: hidden; } }`;
            document.head.appendChild(styleSheet);
            document.body.appendChild(flashDiv);
            setTimeout(() => flashDiv.remove(), 600);
            
            const btnArea = document.getElementById('buttonArea');
            const thankBlock = document.getElementById('thankYouBlock');
            
            setTimeout(() => {
                btnArea.style.transition = 'all 0.4s ease';
                btnArea.style.opacity = '0';
                btnArea.style.transform = 'scale(0.7)';
                setTimeout(() => {
                    btnArea.style.display = 'none';
                    thankBlock.classList.remove('hidden');
                    setTimeout(() => {
                        thankBlock.classList.add('show');
                    }, 30);
                }, 380);
            }, 450);
            
            setTimeout(() => createCosmicConfetti(), 350);
            setTimeout(() => {
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                createMassiveRadialBurst(centerX, centerY);
            }, 200);
        }
        
        // ========== CARD MOVEMENT: subtle floating + mouse follow (but stays centered overall) ==========
        const movingCard = document.getElementById('movingCard');
        
        // Gentle independent floating animation for the card (subtle up/down and slight rotation)
        let cardFloatY = 0;
        let floatDirection = 1;
        function gentleCardFloat() {
            if (!movingCard) return;
            // small smooth floating motion
            cardFloatY += 0.3 * floatDirection;
            if (cardFloatY > 8) { cardFloatY = 8; floatDirection = -1; }
            if (cardFloatY < -8) { cardFloatY = -8; floatDirection = 1; }
            // only apply if not in heavy transition (no conflict with mouse move)
            if (!movingCard.style.transform || movingCard.style.transform.includes('translate')) {
                // combine with existing mouse transform if any? we'll manage via variable
            }
        }
        setInterval(gentleCardFloat, 50);
        
        // Mouse movement parallax (card moves slightly with mouse, always returns to center)
        document.addEventListener('mousemove', (e) => {
            if (!movingCard) return;
            const xAxis = (window.innerWidth / 2 - e.pageX) / 55;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 55;
            // apply transform while preserving the floating effect - combine
            movingCard.style.transform = `translateX(${xAxis}px) translateY(${yAxis + cardFloatY * 0.5}px)`;
        });
        
        // Reset card position smoothly on mouse leave window
        document.addEventListener('mouseleave', () => {
            if (movingCard) {
                movingCard.style.transform = `translateX(0px) translateY(${cardFloatY * 0.5}px)`;
            }
        });
        
        // Also add continuous subtle pulse shadow for cosmic feel
        setInterval(() => {
            if (movingCard) {
                const intensity = Math.sin(Date.now() / 3000) * 0.1 + 0.2;
                movingCard.style.boxShadow = `0 25px 50px rgba(0,0,0,0.5), 0 0 ${40 + intensity * 20}px rgba(255, 160, 100, ${0.2 + intensity * 0.2})`;
            }
        }, 200);
        
        setInterval(() => lucide.createIcons(), 800);
        
        // Additional cosmic dust from center periodically
        setInterval(() => {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            if (Math.random() > 0.6) {
                const dust = document.createElement('div');
                dust.className = 'cosmic-dust';
                dust.style.width = '5px';
                dust.style.height = '5px';
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 200 + 50;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance;
                dust.style.left = `${centerX}px`;
                dust.style.top = `${centerY}px`;
                dust.style.setProperty('--dx', `${dx}px`);
                dust.style.setProperty('--dy', `${dy}px`);
                document.body.appendChild(dust);
                setTimeout(() => dust.remove(), 3000);
            }
        }, 800);
        
        console.log("✨ ....");
    </script>
</body>
</html>
