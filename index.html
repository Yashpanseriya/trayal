<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Sorry | Please Forgive Me</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        
        .font-serif {
            font-family: 'Playfair Display', serif;
        }
        
        /* Gradient Animation */
        .gradient-bg {
            background: linear-gradient(-45deg, #fce7f3, #f3e8ff, #dbeafe, #fce7f3);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Glowing Text Animation */
        .glow-text {
            animation: glow 3s ease-in-out infinite alternate, float 6s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(236, 72, 153, 0.5), 0 0 40px rgba(168, 85, 247, 0.3), 0 0 60px rgba(59, 130, 246, 0.2);
        }
        
        @keyframes glow {
            from {
                text-shadow: 0 0 20px rgba(236, 72, 153, 0.5), 0 0 40px rgba(168, 85, 247, 0.3), 0 0 60px rgba(59, 130, 246, 0.2);
            }
            to {
                text-shadow: 0 0 30px rgba(236, 72, 153, 0.8), 0 0 60px rgba(168, 85, 247, 0.5), 0 0 90px rgba(59, 130, 246, 0.4);
            }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        /* Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }
        
        /* Floating Hearts */
        .heart {
            position: absolute;
            color: rgba(236, 72, 153, 0.4);
            animation: floatUp 10s linear infinite;
            pointer-events: none;
        }
        
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100vh) scale(1.5) rotate(360deg);
                opacity: 0;
            }
        }
        
        /* Particle Animation */
        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: drift 20s infinite linear;
        }
        
        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            50% { opacity: 0.6; }
            100% { transform: translate(100px, -100px) scale(0.5); opacity: 0.3; }
        }
        
        /* Button Hover Effect */
        .forgive-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
            background-size: 200% 200%;
            animation: gradientMove 3s ease infinite;
        }
        
        .forgive-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 20px 40px -10px rgba(236, 72, 153, 0.4);
        }
        
        .forgive-btn:active {
            transform: translateY(0) scale(0.98);
        }
        
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Fade In Animation */
        .fade-in {
            opacity: 0;
            animation: fadeIn 1.5s ease-out forwards;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        .fade-in-delay-1 { animation-delay: 0.5s; }
        .fade-in-delay-2 { animation-delay: 1s; }
        .fade-in-delay-3 { animation-delay: 1.5s; }
        
        /* Typing Cursor */
        .typing-cursor::after {
            content: '|';
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        /* Thank You Message Animation */
        .thank-you-message {
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .thank-you-message.show {
            opacity: 1;
            transform: scale(1);
        }
        
        /* Heart Burst Animation */
        @keyframes heartBurst {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(2) rotate(45deg); opacity: 0; }
        }
        
        .burst-heart {
            position: absolute;
            animation: heartBurst 1s ease-out forwards;
            pointer-events: none;
        }
        
        /* Confetti */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ec4899;
            animation: confettiFall 3s ease-out forwards;
        }
        
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        
        /* Music Toggle */
        .music-toggle {
            transition: all 0.3s ease;
        }
        .music-toggle:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen relative flex items-center justify-center p-4">

    <!-- Background Floating Elements Container -->
    <div id="hearts-container" class="fixed inset-0 pointer-events-none overflow-hidden"></div>
    
    <!-- Ambient Particles -->
    <div id="particles-container" class="fixed inset-0 pointer-events-none"></div>

    <!-- Music Control -->
    <button id="musicToggle" class="music-toggle fixed top-6 right-6 z-50 p-3 rounded-full glass-card text-pink-600 hover:text-pink-700" onclick="toggleMusic()">
        <i data-lucide="music" class="w-6 h-6"></i>
        <span id="musicStatus" class="sr-only">Play Music</span>
    </button>

    <!-- Audio Element -->
    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=soft-piano-100-bpm-121529.mp3" type="audio/mpeg">
    </audio>

    <!-- Main Glass Card -->
    <div class="glass-card rounded-3xl p-8 md:p-12 max-w-2xl w-full text-center relative z-10 fade-in">
        
        <!-- Decorative Icon -->
        <div class="fade-in fade-in-delay-1 mb-6 flex justify-center">
            <div class="p-4 rounded-full bg-pink-100/50 text-pink-500 animate-pulse">
                <i data-lucide="heart" class="w-8 h-8 fill-current"></i>
            </div>
        </div>

        <!-- Main Title -->
        <h1 class="text-6xl md:text-8xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-blue-500 glow-text mb-8 fade-in fade-in-delay-1 tracking-tight">
            SORRY
        </h1>

        <!-- Emotional Message with Typing Effect -->
        <div class="mb-8 fade-in fade-in-delay-2">
            <p id="message" class="font-serif text-xl md:text-2xl text-gray-700 italic typing-cursor leading-relaxed">
                <!-- Text will be inserted by JavaScript -->
            </p>
        </div>

        <!-- Additional Context -->
        <p class="text-gray-500 text-sm md:text-base mb-10 fade-in fade-in-delay-2 font-light">
            Words cannot express how truly remorseful I am. You mean everything to me, and I hope you can find it in your heart to give me another chance.
        </p>

        <!-- Interactive Button -->
        <div id="buttonContainer" class="fade-in fade-in-delay-3">
            <button onclick="handleForgive()" class="forgive-btn px-10 py-4 rounded-full text-white font-semibold text-lg shadow-lg flex items-center justify-center gap-2 mx-auto group">
                <span>Forgive Me</span>
                <i data-lucide="heart" class="w-5 h-5 fill-current group-hover:animate-bounce"></i>
            </button>
        </div>

        <!-- Thank You Message (Hidden Initially) -->
        <div id="thankYouMessage" class="thank-you-message hidden mt-6">
            <div class="p-6 rounded-2xl bg-gradient-to-r from-pink-100 to-purple-100 border border-pink-200">
                <p class="text-2xl font-serif text-pink-700 mb-2">Thank You ❤️</p>
                <p class="text-gray-600 text-sm">You are the best thing that ever happened to me. I promise to make it up to you.</p>
            </div>
        </div>

        <!-- Floating Hearts Footer -->
        <div class="mt-8 flex justify-center gap-2 opacity-50 fade-in fade-in-delay-3">
            <i data-lucide="heart" class="w-4 h-4 text-pink-400 fill-current animate-pulse"></i>
            <i data-lucide="heart" class="w-4 h-4 text-purple-400 fill-current animate-pulse delay-75"></i>
            <i data-lucide="heart" class="w-4 h-4 text-blue-400 fill-current animate-pulse delay-150"></i>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Typing Animation
        const messageText = "I didn't mean to hurt you. Please forgive me.";
        const messageElement = document.getElementById('message');
        let charIndex = 0;

        function typeMessage() {
            if (charIndex < messageText.length) {
                messageElement.textContent += messageText.charAt(charIndex);
                charIndex++;
                setTimeout(typeMessage, 50 + Math.random() * 50); // Random typing speed for realism
            } else {
                // Remove cursor after typing is done
                setTimeout(() => {
                    messageElement.classList.remove('typing-cursor');
                }, 1000);
            }
        }

        // Start typing after initial fade-in
        setTimeout(typeMessage, 1500);

        // Floating Hearts Generator
        function createFloatingHeart() {
            const container = document.getElementById('hearts-container');
            const heart = document.createElement('div');
            heart.className = 'heart';
            
            // Randomize heart properties
            const size = Math.random() * 20 + 10;
            const left = Math.random() * 100;
            const duration = Math.random() * 5 + 8;
            const delay = Math.random() * 5;
            
            heart.style.width = `${size}px`;
            heart.style.height = `${size}px`;
            heart.style.left = `${left}%`;
            heart.style.animationDuration = `${duration}s`;
            heart.style.animationDelay = `${delay}s`;
            heart.style.opacity = Math.random() * 0.5 + 0.1;
            
            // Use SVG for heart shape
            heart.innerHTML = `
                <svg viewBox="0 0 24 24" fill="currentColor" class="w-full h-full">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                </svg>
            `;
            
            container.appendChild(heart);
            
            // Remove heart after animation
            setTimeout(() => {
                heart.remove();
            }, (duration + delay) * 1000);
        }

        // Create hearts periodically
        setInterval(createFloatingHeart, 800);

        // Initial burst of hearts
        for (let i = 0; i < 10; i++) {
            setTimeout(createFloatingHeart, i * 200);
        }

        // Ambient Particles
        function createParticle() {
            const container = document.getElementById('particles-container');
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const size = Math.random() * 4 + 2;
            const left = Math.random() * 100;
            const top = Math.random() * 100;
            
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${left}%`;
            particle.style.top = `${top}%`;
            particle.style.animationDuration = `${Math.random() * 10 + 10}s`;
            
            container.appendChild(particle);
            
            setTimeout(() => particle.remove(), 20000);
        }

        // Create particles
        for (let i = 0; i < 20; i++) {
            createParticle();
        }
        setInterval(createParticle, 3000);

        // Handle Forgive Button Click
        function handleForgive() {
            const buttonContainer = document.getElementById('buttonContainer');
            const thankYouMessage = document.getElementById('thankYouMessage');
            const btn = buttonContainer.querySelector('button');
            
            // Disable button and change text
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-pulse">Sending Love...</span>';
            
            // Create burst of hearts around button
            for (let i = 0; i < 30; i++) {
                setTimeout(() => createBurstHeart(btn), i * 50);
            }
            
            // Create confetti
            createConfetti();
            
            // Show thank you message after delay
            setTimeout(() => {
                buttonContainer.style.opacity = '0';
                buttonContainer.style.transform = 'scale(0.8)';
                
                setTimeout(() => {
                    buttonContainer.style.display = 'none';
                    thankYouMessage.classList.remove('hidden');
                    setTimeout(() => {
                        thankYouMessage.classList.add('show');
                    }, 50);
                }, 300);
            }, 1000);
            
            // Play success sound (optional, using Web Audio API for soft chime)
            playSuccessSound();
        }

        // Burst Heart Effect
        function createBurstHeart(element) {
            const rect = element.getBoundingClientRect();
            const heart = document.createElement('div');
            heart.className = 'burst-heart text-pink-500';
            
            const size = Math.random() * 20 + 10;
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * 100 + 50;
            const tx = Math.cos(angle) * distance;
            const ty = Math.sin(angle) * distance;
            
            heart.style.width = `${size}px`;
            heart.style.height = `${size}px`;
            heart.style.left = `${rect.left + rect.width/2}px`;
            heart.style.top = `${rect.top + rect.height/2}px`;
            heart.style.color = ['#ec4899', '#8b5cf6', '#3b82f6'][Math.floor(Math.random() * 3)];
            heart.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" class="w-full h-full"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>`;
            
            document.body.appendChild(heart);
            
            // Animate with CSS custom properties for direction
            heart.style.setProperty('--tx', `${tx}px`);
            heart.style.setProperty('--ty', `${ty}px`);
            heart.style.animation = `heartBurst 1s ease-out forwards`;
            
            setTimeout(() => heart.remove(), 1000);
        }

        // Confetti Effect
        function createConfetti() {
            const colors = ['#ec4899', '#8b5cf6', '#3b82f6', '#f472b6', '#a855f7'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 4000);
            }
        }

        // Soft Chime Sound
        function playSuccessSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime); // C5
            oscillator.frequency.exponentialRampToValueAtTime(659.25, audioContext.currentTime + 0.1); // E5
            oscillator.frequency.exponentialRampToValueAtTime(783.99, audioContext.currentTime + 0.2); // G5
            
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        // Background Music Toggle
        let isPlaying = false;
        const music = document.getElementById('bgMusic');
        const musicToggle = document.getElementById('musicToggle');
        
        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                musicToggle.innerHTML = '<i data-lucide="music" class="w-6 h-6"></i><span id="musicStatus" class="sr-only">Play Music</span>';
                isPlaying = false;
            } else {
                music.volume = 0.3; // Soft volume
                music.play().catch(e => console.log('Audio play failed:', e));
                musicToggle.innerHTML = '<i data-lucide="volume-2" class="w-6 h-6"></i><span id="musicStatus" class="sr-only">Pause Music</span>';
                isPlaying = true;
            }
            lucide.createIcons();
        }

        // Add mouse movement parallax effect to card
        const card = document.querySelector('.glass-card');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth - e.pageX * 2) / 100;
            const y = (window.innerHeight - e.pageY * 2) / 100;
            card.style.transform = `translateX(${x}px) translateY(${y}px)`;
        });

        // Auto-play music hint (browsers block autoplay, so we hint user)
        window.addEventListener('load', () => {
            setTimeout(() => {
                if (!isPlaying) {
                    musicToggle.classList.add('animate-bounce');
                    setTimeout(() => musicToggle.classList.remove('animate-bounce'), 2000);
                }
            }, 3000);
        });
    </script>
</body>
</html>
